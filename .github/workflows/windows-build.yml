name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build EXE
        run: scripts\build_windows_exe.bat
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: ProcessSecurityAuditorAVPro
          path: dist/ProcessSecurityAuditorAVPro.exe
